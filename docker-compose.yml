services:
  mysql:
    image: mysql:8.0
    container_name: dms-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?MYSQL_DATABASE is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_ROOT_HOST: "%"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - dms_network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "java ${JAVA_OPTS:-\"-XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=25\"} -jar /app/app.jar"]
    expose:
      - "8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILE:?SPRING_PROFILE is required}
      SERVER_PORT: "8082"
      SPRING_DATASOURCE_URL: jdbc:mysql://dms-mysql:3306/${MYSQL_DATABASE}?serverTimezone=UTC&useUnicode=yes&characterEncoding=UTF-8&rewriteBatchedStatements=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      JAVA_OPTS: ${JAVA_OPTS:?JAVA_OPTS is required}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      AWS_REGION: ${AWS_REGION:?AWS_REGION is required}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required}
      S3_BUCKET_NAME: ${AWS_S3_BUCKET:?AWS_S3_BUCKET is required}
      S3_PREFIX: ${S3_PREFIX:?S3_PREFIX is required}
      TZ: ${TZ:?TZ is required}
    networks:
      - dms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/login"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    container_name: dms-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - dms_network

networks:
  dms_network:
    driver: bridge

volumes:
  mysql_data:
