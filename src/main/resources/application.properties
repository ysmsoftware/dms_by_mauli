server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=framework
server.tomcat.use-relative-redirects=true

#database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3305/dms?serverTimezone=UTC&useUnicode=yes&characterEncoding=UTF-8&rewriteBatchedStatements=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Gem@2021$}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

server.servlet.session.timeout=-1

logging.level.com.edumatch=debug
logging.file.path=C:/logs/dms.log
#logging.file.path=/home/logs/dms.log
logging.pattern.file=%date{dd MMM yyyy - HH:mm:ss.SSS} %5p %c{1}:%L - %m%n
logging.pattern.console=%date{dd MMM yyyy - HH:mm:ss.SSS} %5p %c{1}:%L - %m%n

#aws s3 configuration
cloud.aws.region=${AWS_REGION:us-east-1}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}
app.s3.bucket-name=${S3_BUCKET_NAME:${AWS_S3_BUCKET:}}
app.s3.prefix=${S3_PREFIX:realestate-app}
app.s3.presigned-url-expiry-minutes=${S3_PRESIGNED_URL_EXPIRY_MINUTES:10}
app.s3.public-base-url=${S3_PUBLIC_BASE_URL:}
app.storage.temp-dir=${APP_STORAGE_TEMP_DIR:/tmp/dms-storage/}
