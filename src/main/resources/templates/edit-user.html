<body class="hold-transition sidebar-mini layout-fixed">

 <!-- Content Wrapper. Contains page content -->
		<div class="content-wrapper">
			<!-- Content Header (Page header) -->
			<section class="content-header">
				<div class="container-fluid">
					<div class="row mb-2">
						<div class="col-sm-6">
							<h1 class="m-0 text-dark">Edit User</h1>
						</div>
						<div class="col-sm-6">
				            <ol class="breadcrumb float-sm-right">
				              <li class="breadcrumb-item"><a href="#">Users</a></li>
				              <li class="breadcrumb-item active">Edit User</li>
				            </ol>
				        </div><!-- /.col -->
					</div>
				</div>
				<!-- /.container-fluid -->
			</section>
    		<!-- Main content -->
			<section class="content">
				<div class="container-fluid">
					<div class="row">
						<!-- left column -->
						<div class="col-md-12">
							<!-- general form elements -->
							<div class="card card-outline card-primary">
								<!-- <div class="card-header">
									<h3 class="card-title">Add Form</h3>
								</div> -->
								<!-- /.card-header -->
								<!-- form start -->
								<form role="form" class="form-horizontal" th:action="@{/update-user}" method="post" id="user">
									
									<input type="hidden" id="userId" name="id" th:value="${usr.id}">
									<input type="hidden" name="enabled" th:value="${usr.enabled}">
									<input type="hidden" id="userPhoto" name="userPhoto"  th:value="${usr.userPhoto}" />
									<input type="hidden" name="role" th:value="${usr.role}">
									<div class="card-body">
																		
										<div class="form-group row">
											<div class='col-sm-2'>
												<label for="documentCategory">Department<span class="text-danger">*</span></label>
											</div>
											<div class="col-sm-3">
												<select class="form-control select2"  data-placeholder="Select Department" id="departmentId" name="departmentId" required="required">
													<option></option>
													<option th:each="dept:${departmentList}" th:value="${dept.departmentId}" th:text="${dept.departmentName}" th:selected="${dept.departmentId == usr.departmentId}"></option>
												</select>													
											</div>	
											<div class='col-sm-3'> 
											   <div class='row'>
												 <a class='col-sm-3' href="#" title="Add New Department" data-toggle="modal" data-target="#modal-department"><div class="timeline timeline-inverse">
												 <div><i class="fas fa-plus bg-primary"></i></div></div> </a>
												 <span class='col-sm-9 text-primary'><a href="#" title="Add New Department" data-toggle="modal" data-target="#modal-department">Add New Department</a></span>
											  </div>
											</div>											
										</div>
										
										<div class="form-group row">
											<div class='col-sm-2'>
												<label for="name">User Name</label>
											</div>
											<div class="col-sm-3">
												<input type="text" class="form-control" id="name" name="name" required="required" th:value="${usr.name}">													
											</div>											
										</div>																		
										
										<div class="form-group row">
											<div class='col-sm-2'>
												<label for="mobile">Mobile Number</label>
											</div>
											<div class="col-sm-3">
												<input type="text" class="form-control" id="mobile" name="mobile"  required="required" th:value="${usr.mobile}">													
											</div>											
										</div>
										
										<div class="form-group row">
											<div class='col-sm-2'>
												<label for="password">User Password</label>
											</div>
											<div class="col-sm-3">
												<input type="text" class="form-control" id="password" name="password"  required="required" th:value="${usr.userPasswordRead}">													
											</div>											
										</div>
																		
									</div>
									<!-- /.card-body -->
									<div class="card-footer row">
									      <div class="col-sm-2" ></div>
									   		<button type="submit" id="btnSubmit" class="btn btn-primary  col-md-offset-2" >Update</button>
									</div>
								</form>
							</div>
							<!-- /.card -->
						</div>
						<!--/.col (left) -->
					</div>
					<!-- /.row -->
					
					<div class="card ">            
              <div class="card-header">
                <h3 class="card-title">Change User Photo</h3>
              </div>
               
              <div class="card-body"> 
	            <div class="row">	             
	             <div class="col-md-6">	                 
	                  <div class="col-12 text-center">
					      <img th:src="@{${filePath}+${usr.userPhoto}}" height="128px" width="128px" alt="User Photo" id="profile-picture" class="img-circle img-fluid">
					  </div>
                 </div>	             
	            </div>
	            </div>
	            
	            <div class="card-footer">
	            <div class="row">	             
	               <div class="col-md-12">		
	                  <div class="custom-file col-md-6 ">
                        <input type="file" class="custom-file-input" id="profilePicInputFile" accept="image/*" >
                        <label class="custom-file-label" for="profilePicInputFile">Choose file</label>
                      </div>
                  </div>	             
	            </div>
               </div>
            </div>
					
					
				</div>
				<!-- /.container-fluid -->
			</section>
			<!-- /.content -->
			
			<div class="modal fade" id="modal-department">
		        <div class="modal-dialog">
		          <div class="modal-content">
		            <form id="form1" name="form1">
		            <div class="modal-header">
		              <h4 class="modal-title">Add Department</h4>
		              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
		                <span aria-hidden="true">&times;</span>
		              </button>
		            </div>
		            <div class="modal-body">
		              <p><input type="text" class="form-control" id="departmentName" name="departmentName" placeholder="Enter Department Name" required="required"  ></p>
		            </div>
		            <div class="modal-footer justify-content-between">
		              <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
		              <button type="button" class="btn btn-primary" id="btnSaveDepartment">Save</button>
		            </div>
		            </form>
		          </div>
		          <!-- /.modal-content -->
			   </div>
			</div>
			<!-- /.modal -->
			
		</div>

<script  th:src="@{/dist/js/pages/dashboard.js}"></script> -->

<script th:src="@{/plugins/jquery-validation/jquery.validate.min.js}"></script>

<script type="text/javascript">
jQuery(document).ready(function () {
	
	var contextPath = '[[${contextPath}]]';
	
	 $('.select2').select2();
	
	bsCustomFileInput.init();
	   
	 $('#btnSaveDepartment').click(function() {
	   	 
			if($("#form1")[0].checkValidity()) {
           
				  var departmentName= $("#departmentName").val();
								  
				  $.ajax({
					  url:  contextPath+'/addDepartment',
					  type: 'POST',
					  dataType : 'json',
			          data: {"departmentName":departmentName},
					  success: function(result) {	
						 
						  $("#departmentId").empty();
						  var $options = "<option></option>";
						  for (var i = 0; i < result.length; i++) {
							  var deptName = result[i].departmentName; 
							  var deptId = result[i].departmentId; 
							  if(departmentName.toLowerCase() == deptName.toLowerCase()){
								  $options +=  "<option value='"+deptId+"' selected='selected'>"+deptName+"</option>" 
							  }else{
								  $options +=  "<option value="+deptId+">"+deptName+"</option>"
							  }						  
						  }
						  $('#departmentId').html($options);							
					  },
					  error: function(e) {
						//called when there is an error
						//console.log(e.message);
					  }
				  });	
				
				  $("#modal-department").modal('hide');
				  
       } else {
           $("#form1")[0].reportValidity();
       }			  
	 }); 
		
	 $("#modal-department").on("hidden.bs.modal", function () {
		  $("#departmentName").val('');
	 });
	
	$('#profilePicInputFile').change(function(e){   	  
		 		
	     // getting a hold of the file reference
	     var file = e.target.files[0]; 
	     
	     const  fileType = file['type'];
	      const validImageTypes = ['image/gif', 'image/jpeg', 'image/png'];
	      if (!validImageTypes.includes(fileType)) {
	    	 toastr.error("Invalid file format.");
	    	 return false;
	      } 
	     // setting up the reader
	     var reader = new FileReader();
	     reader.readAsDataURL(file); // this is reading as data url
             	
	     var content; 
	     // here we tell the reader what to do when it's done reading...
	     reader.onload = readerEvent => {
	    	content = readerEvent.target.result; // this is the content!    	        
	        document.getElementById('profile-picture').setAttribute( 'src', content);
	        document.getElementById('sidebar-profile-picture').setAttribute( 'src', content);    	        
	    }
	     
	    e.preventDefault();
	    
	    var fileName = file.name;
	    
	    var myFormData = new FormData();
	    myFormData.append('userId', $('#userId').val());
	    myFormData.append('file', file, fileName);
	    
	    		  
	     $.ajax({
			  url: contextPath+'/uploadUserProfilePicture',
			  type: 'POST',
		      processData: false, // important
		      contentType: false, // important
		      dataType : 'json',
		      data: myFormData, 
			  success: function(data) {
				 
			  },
			  error: function(e) {
				//called when there is an error
				//console.log(e.message);
			  }
			})
			
			 toastr.success("Profile picture changed.");	
   }); 
});
</script>
